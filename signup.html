<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusMate</title>
</head>

<style> /* style choices, css */
    header{ /* header style: Green background, title in center*/
        background-color: #4D825A;
        text-align: center;
    }
</style>

<header>
    <h1>FocusMate</h1>
</header>

<body>
    <div class="signup">
        <h2>Create an Account</h2>
        <p id="error-message" class="error-text"></p>

        <form id="signup-form">
            <div class="input">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>

            <div class="input">
                <label for="password">Password</label>
                <input type="text" id="password" placeholder="Enter password" required>
            </div>

            <div class="input"><!--make sure passwords match and save-->
                <label for="password">Confirm Password</label>
                <input type="text" id="password" placeholder="Confirm password" required>
            </div>
        </form>
    </div>
</body>
</html>
